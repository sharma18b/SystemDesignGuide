  <line x1="18" y1="14" x2="21" y2="14" stroke="#1e3a8a" stroke-width="1.2" stroke-linecap="round"/>
  <line x1="18" y1="17" x2="21" y2="17" stroke="#1e3a8a" stroke-width="1.2" stroke-linecap="round"/>
</svg>
